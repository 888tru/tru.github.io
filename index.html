    function bindFreeInvestigationLab() {
      const freeDoc = document.getElementById("freeDoc");
      const freeOut = document.getElementById("freeLabOut");

      document.getElementById("freeResetBtn").addEventListener("click", () => {
        freeDoc.value = state.userMessage || "RENTAL CONTRACT\nTenant: Alice Johnson\nMonthly Rent: $500";
        freeOut.innerHTML = "";
      });

      document.getElementById("freeRunBtn").addEventListener("click", async () => {
        const action = document.querySelector("input[name='freeAction']:checked");
        if (!action) return setError(document.getElementById("freeLabCard"), "Select an experiment first.", "freeLabHint");
        if (!state.signature || !state.keyPair.publicKey) {
          freeOut.innerHTML = `<div class="warning">No signature found. Complete Modules 1-3 first to generate a real signature.</div>`;
          return;
        }

        freeOut.innerHTML = `<div class="load"><span class="spinner"></span> Running experiment...</div>`;
        try {
          let docToVerify = freeDoc.value;
          let keyToUse = state.keyPair.publicKey;
          let label = "";

          if (action.value === "tamper") {
            label = `<div class="ai-tip" style="margin-bottom:8px;">🕵️ Eve modified the document before sending to Bob.</div>`;
          } else if (action.value === "wrongkey") {
            const tempKp = await crypto.subtle.generateKey(
              state.selectedAlgo === "ECDSA"
                ? { name: "ECDSA", namedCurve: state.selectedKeySize || "P-256" }
                : { name: state.selectedAlgo || "RSA-PSS", modulusLength: 2048, publicExponent: new Uint8Array([1,0,1]), hash: "SHA-256" },
              true, ["sign", "verify"]
            );
            keyToUse = tempKp.publicKey;
            label = `<div class="ai-tip" style="margin-bottom:8px;">🔑 Using a completely different public key — not Alice's.</div>`;
          }

          const ok = await verifyWithCurrentAlgo(docToVerify, state.signature, "SHA-256", keyToUse);
          const color = ok ? "rgba(51,209,122,.6)" : "rgba(255,93,108,.6)";
          const icon = ok ? "✅" : "❌";
          const msg = ok
            ? "SIGNATURE VALID — document is authentic and unmodified."
            : "SIGNATURE INVALID — the signature does not match this document/key combination.";

          freeOut.innerHTML = `${label}
            <div class="mini-card ${ok ? "success-burst" : "shake"}" style="border-color:${color};">
              <div style="font-size:1.2rem; font-weight:800; color:${ok ? "var(--green)" : "var(--red)"};">${icon} ${msg}</div>
              <div class="subtitle" style="margin-top:8px;">Action: ${escapeHtml(action.value)} · Algorithm: ${escapeHtml(getSelectedAlgoLabel())}</div>
            </div>`;
        } catch(e) {
          freeOut.innerHTML = `<div class="warning">Experiment failed: ${escapeHtml(e.message)}</div>`;
        }
      });

      document.getElementById("freeSubmitBtn").addEventListener("click", () => {
        const conclusion = document.getElementById("freeConclusion").value.trim();
        if (!conclusion) return setError(document.getElementById("freeLabCard"), "Write your conclusion first.", "freeLabHint");
        freeOut.insertAdjacentHTML("beforeend", `
          <div class="final-card shine" style="margin-top:14px;">
            <div style="font-size:1.5rem; margin-bottom:8px;">🎓 Course Complete</div>
            <div>Your conclusion: <em>"${escapeHtml(conclusion)}"</em></div>
            <div class="subtitle" style="margin-top:8px;">You have successfully learned digital signatures by doing — not just reading.</div>
          </div>`);
        showConfetti();
        if (!state.unlockedModules.includes(6)) setTimeout(() => unlockModule(5), 600);
      });
    }

    function bindDragFlow() {
      const blocks = document.querySelectorAll(".block");
      const slots = document.querySelectorAll(".drop-slot");
      let dragged = null;

      blocks.forEach((b) => {
        b.addEventListener("dragstart", () => { dragged = b; setTimeout(() => b.style.opacity = "0.5", 0); });
        b.addEventListener("dragend", () => { b.style.opacity = "1"; dragged = null; });
      });

      slots.forEach((slot) => {
        slot.addEventListener("dragover", (e) => { e.preventDefault(); slot.classList.add("over"); });
        slot.addEventListener("dragleave", () => slot.classList.remove("over"));
        slot.addEventListener("drop", (e) => {
          e.preventDefault();
          slot.classList.remove("over");
          if (!dragged || slot.children.length > 0) return;
          slot.textContent = "";
          slot.appendChild(dragged);
        });
      });

      document.getElementById("bank").addEventListener("dragover", (e) => e.preventDefault());
      document.getElementById("bank").addEventListener("drop", (e) => { e.preventDefault(); if (dragged) document.getElementById("bank").appendChild(dragged); });

      document.getElementById("checkFlow").addEventListener("click", () => {
        const expected = { sign: ["sign0", "sign1", "sign2"], ver: ["ver0", "ver1", "ver2"] };
        let ok = true;

        slots.forEach((slot) => {
          const zone = slot.dataset.zone;
          const pos = Number(slot.dataset.pos);
          const block = slot.querySelector(".block");
          const id = block ? block.dataset.id : "";
          const correct = id === expected[zone][pos];
          if (!correct) ok = false;
          if (block) {
            if (correct) block.classList.add("correct");
            else {
              block.classList.remove("correct");
              block.classList.add("shake");
              setTimeout(() => { document.getElementById("bank").appendChild(block); slot.textContent = `Step ${pos + 1}`; }, 360);
            }
          }
        });

        if (ok) {
          state.module5FlowDone = true;
          document.getElementById("flowHint").textContent = "Perfect flow.";
          document.getElementById("flowHint").classList.add("success-note");
          showToast("Flow correct. Next step unlocked.", "success");
          setTimeout(() => nextStep(5), 600);
        } else {
          setError(document.getElementById("m5Flow"), "Wrong placement detected. Try again.", "flowHint");
        }
      });
    }

    function getQuizExplain(q) {
      if (q === "q1") return "Signing uses Alice's PRIVATE key.";
      if (q === "q2") return "Verification uses Alice's PUBLIC key.";
      return "Mismatch means integrity failure (tampering).";
    }

    function bindScenarioQuiz() {
      const quiz = document.getElementById("m5Quiz");
      const answers = {};

      quiz.querySelectorAll(".quiz-q").forEach((q) => {
        const qId = q.dataset.q;
        const ans = q.dataset.answer;
        q.querySelectorAll(".opt").forEach((opt) => {
          opt.addEventListener("click", () => {
            q.querySelectorAll(".opt").forEach((o) => o.classList.remove("correct", "wrong", "shake"));
            const chosen = opt.dataset.v;
            answers[qId] = chosen;
            if (chosen === ans) {
              opt.classList.add("correct");
              const hint = document.getElementById(`${qId}Hint`);
              hint.textContent = "Correct.";
              hint.classList.add("success-note");
            } else {
              opt.classList.add("wrong", "shake");
              document.getElementById(`${qId}Hint`).textContent = getQuizExplain(qId);
            }
            checkFinalQuiz(answers);
          });
        });
      });
    }

    function bindAttackChallenge() {
      const task = document.getElementById("m5AttackLab");
      const msgInput = document.getElementById("attackMsgInput");
      const out = document.getElementById("attackVerifyOut");
      const qWrap = document.getElementById("attackQuestion");

      async function verifyCurrent(label, changed) {
        const currentMessage = msgInput.value;
        if (!currentMessage.trim()) return setError(task, "Message cannot be empty.", null);
        out.innerHTML = `<div class="load"><span class="spinner"></span> ${escapeHtml(label)}...</div>`;
        try {
          const h = await sha256(currentMessage);
          const ok = await crypto.subtle.verify(getVerifyAlgorithm(), state.keyPair.publicKey, state.signature, h.buffer);
          out.innerHTML = `
            <div class="mini-card" style="border-color:${ok ? "rgba(51,209,122,.6)" : "rgba(255,93,108,.6)"};">
              <div><strong>Verification result:</strong> ${ok ? "✅ VALID" : "❌ INVALID"}</div>
              <code class="hash">${escapeHtml(h.hex)}</code>
              <div class="subtitle" style="margin-top:8px;">${ok ? "Signature still matches this exact message." : "Signature no longer matches this message."}</div>
            </div>`;
          if (changed) state.module5AttackSeen.tampered = true;
          else state.module5AttackSeen.asIs = true;
          if (state.module5AttackSeen.asIs && state.module5AttackSeen.tampered) qWrap.style.display = "block";
        } catch {
          setError(task, "Verification failed in attack challenge.", null);
        }
      }

      document.getElementById("verifyAsIs").addEventListener("click", () => verifyCurrent("Verifying as-is", false));
      document.getElementById("tamperVerify").addEventListener("click", () => {
        if (msgInput.value === state.userMessage) msgInput.value = `${state.userMessage} [tampered]`;
        verifyCurrent("Verifying after tamper", true);
      });

      const submitBtn = document.getElementById("submitAttackAnswer");
      if (!submitBtn) return;
      submitBtn.addEventListener("click", () => {
        const answer = document.getElementById("attackAnswer").value.trim();
        if (!answer) return setError(task, "Write a short explanation before submitting.", null);
        const answerOut = document.getElementById("attackAnswerOut");
        answerOut.innerHTML = `
          <div class="final-card success-burst" style="margin-top:8px;">
            <strong>Model Answer</strong>
            <div style="margin-top:6px;">Yes, the second result is expected. A digital signature binds to an exact message hash. If the message changes, SHA-256 changes, so verification with the old signature fails.</div>
          </div>`;
        showConfetti();
        setTimeout(() => nextStep(5), 900);
      });
    }

    function renderFinalSummary() {
      const area = document.getElementById("summaryArea");
      area.innerHTML = `
        <div class="final-card shine success-burst">
          <h3>Final Summary</h3>
          <div class="stack" style="margin-top:8px;">
            <div>1. Write message → hash with SHA-256 → sign hash with private key.</div>
            <div>2. Send message + signature + public key.</div>
            <div>3. Receiver verifies signature and checks hash consistency.</div>
          </div>
          <div class="mini-card" style="margin-top:10px;">You've learned: <strong>3 cryptographic concepts</strong>, <strong>2 key types</strong>, <strong>1 complete protocol</strong>.</div>
          <div style="margin-top:12px;"><span class="badge">🏆 Digital Signature Expert</span></div>
        </div>`;
    }

    function showConfetti() {
      const canvas = document.getElementById("confetti");
      const ctx = canvas.getContext("2d");
      canvas.hidden = false;
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const pieces = Array.from({ length: 180 }, () => ({
        x: Math.random() * canvas.width,
        y: -20 - Math.random() * canvas.height,
        s: 4 + Math.random() * 8,
        vx: -2 + Math.random() * 4,
        vy: 2 + Math.random() * 4,
        r: Math.random() * Math.PI,
        vr: -0.2 + Math.random() * 0.4,
        c: ["#6c63ff", "#00d4ff", "#33d17a", "#ffd24a", "#ff5d6c"][Math.floor(Math.random() * 5)]
      }));

      let frame = 0;
      function draw() {
        frame += 1;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach((p) => {
          p.x += p.vx;
          p.y += p.vy;
          p.r += p.vr;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.r);
          ctx.fillStyle = p.c;
          ctx.fillRect(-p.s / 2, -p.s / 2, p.s, p.s * 0.6);
          ctx.restore();
        });
        if (frame < 220) requestAnimationFrame(draw);
        else {
          canvas.hidden = true;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }
      draw();
    }

    function checkFinalQuiz(answers) {
      const correct = { q1: "private", q2: "alicepub", q3: "tampered" };
      if (Object.keys(answers).length !== 3) return;
      const score = Object.keys(correct).reduce((acc, k) => acc + (answers[k] === correct[k] ? 1 : 0), 0);
      state.quizScore = score;
      const hint = document.getElementById("quizHint");
      if (score === 3) {
        hint.textContent = "All correct. Outstanding.";
        hint.classList.add("success-note");
        state.module5ScenarioDone = true;
        setTimeout(() => nextStep(5), 600);
      } else {
        hint.textContent = `Score: ${score}/3. Correct the wrong answers.`;
        hint.classList.remove("success-note");
      }
    }

    function render() {
      renderTopBar();
      const root = document.getElementById("moduleRoot");
      if (state.showProcessMap) {
        root.innerHTML = renderProcessMap();
        bindProcessMap();
        return;
      }
      const step = state.moduleSteps[state.currentModule] || 0;
      if (state.currentModule === 0) root.innerHTML = renderModule0(step);
      if (state.currentModule === 1) root.innerHTML = renderModule1(step);
      if (state.currentModule === 2) root.innerHTML = renderModule2(step);
      if (state.currentModule === 3) root.innerHTML = renderModule3(step);
      if (state.currentModule === 4) root.innerHTML = renderModule4(step);
      if (state.currentModule === 5) root.innerHTML = renderModule5(step);

      if (state.currentModule === 0) bindModule0(step);
      if (state.currentModule === 1) bindModule1(step);
      if (state.currentModule === 2) bindModule2(step);
      if (state.currentModule === 3) bindModule3(step);
      if (state.currentModule === 4) bindModule4(step);
      if (state.currentModule === 5) bindModule5(step);
      const backBtn = document.getElementById("backToMapInline");
      if (backBtn) {
        backBtn.addEventListener("click", () => {
          state.showProcessMap = true;
          render();
        });
      }
    }

    let splashAnim = 0;
    function startSplashRain() {
      const canvas = document.getElementById("splashRain");
      const ctx = canvas.getContext("2d");
      const chars = "0123456789ABCDEF";
      let drops = [];

      function resizeRain() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const count = Math.max(80, Math.floor(canvas.width / 14));
        drops = Array.from({ length: count }, () => ({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          speed: 1.6 + Math.random() * 3.6,
          size: 12 + Math.random() * 6,
          c: Math.random() > 0.5 ? "rgba(0,212,255,0.75)" : "rgba(51,209,122,0.72)"
        }));
      }

      function draw() {
        ctx.fillStyle = "rgba(10,10,15,0.22)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drops.forEach((d) => {
          d.y += d.speed;
          if (d.y > canvas.height + 20) {
            d.y = -20;
            d.x = Math.random() * canvas.width;
          }
          ctx.fillStyle = d.c;
          ctx.font = `${d.size}px JetBrains Mono`;
          ctx.fillText(chars[Math.floor(Math.random() * chars.length)], d.x, d.y);
        });
        splashAnim = requestAnimationFrame(draw);
      }

      resizeRain();
      draw();
      return resizeRain;
    }

    function initSplash() {
      const splash = document.getElementById("splash");
      const app = document.getElementById("appMain");
      const enterBtn = document.getElementById("enterLabBtn");
      const resizeRain = startSplashRain();
      setTimeout(() => enterBtn.classList.add("show"), 2500);
      enterBtn.addEventListener("click", () => {
        splash.style.opacity = "0";
        setTimeout(() => {
          cancelAnimationFrame(splashAnim);
          splash.remove();
          app.style.display = "block";
          render();
        }, 600);
      });
      return resizeRain;
    }

    const resizeSplashRain = initSplash();

    window.addEventListener("resize", () => {
      const c = document.getElementById("confetti");
      if (c && !c.hidden) {
        c.width = window.innerWidth;
        c.height = window.innerHeight;
      }
      if (typeof resizeSplashRain === "function" && document.getElementById("splash")) resizeSplashRain();
    });
  </script>
</body>
